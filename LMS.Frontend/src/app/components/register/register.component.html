<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Create Account</h1>
      <p>Join our learning community</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input 
          type="text" 
          id="fullName"
          class="form-control"
          formControlName="fullName"
          placeholder="Your full name"
          [class.is-invalid]="submitted && f['fullName'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['fullName'].errors">
          Full name is required
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="your@email.com"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['email'].errors">
          Valid email is required
        </div>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" class="form-control" formControlName="role">
          <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Pick a strong password"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['password'].errors">
          Password must be at least 6 characters
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword"
          class="form-control"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
          [class.is-invalid]="submitted && f['confirmPassword'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['confirmPassword'].errors">
          Please confirm your password
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
